<!--
  DFX SOC — Wazuh Agent ossec.conf (Linux)
  Template for customer Linux agents (Ubuntu/Debian/RHEL/CentOS/Rocky/Alma)

  Prerequisites:
    - auditd installed + baseline audit.rules deployed
      (see reference/wazuh/audit.rules)
    - (Optional) Sysmon for Linux installed
    - Agent registered to manager

  What this config enables:
    - Auditd log collection (CRITICAL for CVE detection)
    - Syslog + auth.log collection
    - Kernel log collection
    - FIM/syscheck for critical paths (exploit artifacts)
    - Syscollector for vulnerability detection
    - (Optional) Sysmon for Linux log collection

  Deploy to: /var/ossec/etc/ossec.conf (on Linux agent)
  Last updated: 2026-05-16

  IMPORTANT: Replace MANAGER_IP with actual manager IP/hostname
-->
<ossec_config>

  <!-- ============================================================ -->
  <!-- CLIENT — Manager connection                                  -->
  <!-- ============================================================ -->
  <client>
    <server>
      <address>192.168.1.107</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu22, ubuntu22.04</config-profile>
    <crypto_method>aes</crypto_method>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
  </client>

  <!-- ============================================================ -->
  <!-- LABELS — Agent metadata for SOC categorization               -->
  <!-- Customize per customer/environment                           -->
  <!-- ============================================================ -->
  <labels>
    <label key="customer">CUSTOMER_NAME</label>
    <label key="environment">production</label>
    <label key="os.family">linux</label>
    <!-- Optional: tier for alert routing -->
    <!-- <label key="tier">critical</label> -->
  </labels>

  <!-- Client buffer — tune for high-volume auditd environments -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ============================================================ -->
  <!-- LOGGING                                                       -->
  <!-- ============================================================ -->
  <logging>
    <log_format>plain</log_format>
  </logging>

  <!-- ============================================================ -->
  <!-- ROOTCHECK — Policy monitoring                                -->
  <!-- ⚠️ PERFORMANCE: Full filesystem scan every 12h.              -->
  <!--    Can cause I/O spikes on busy servers.                     -->
  <!--    DISABLE on performance-sensitive workloads.               -->
  <!-- ============================================================ -->
  <rootcheck>
    <disabled>yes</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
    <rootkit_files>/var/ossec/etc/rootcheck/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>/var/ossec/etc/rootcheck/rootkit_trojans.txt</rootkit_trojans>
    <skip_nfs>yes</skip_nfs>
  </rootcheck>

  <!-- ============================================================ -->
  <!-- WODLES — System inventory & compliance                       -->
  <!-- ============================================================ -->
  <!-- ⚠️ PERFORMANCE: Scans all packages, ports, processes every interval.
       On servers with 1000+ packages, this takes 30-60s of CPU.
       Set to 12h or disable on resource-constrained agents. -->
  <wodle name="syscollector">
    <disabled>yes</disabled>
    <interval>12h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

  <!-- SCA — Security Configuration Assessment (CIS benchmarks) -->
  <!-- ⚠️ PERFORMANCE: Runs CIS checks every 12h. Light on CPU
       but generates many alerts on first run. -->
  <wodle name="sca">
    <enabled>no</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </wodle>

  <!-- ============================================================ -->
  <!-- SYSCHECK — File integrity monitoring                         -->
  <!-- Critical for CVE detection (DirtyFrag, etc.)                 -->
  <!-- ============================================================ -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>600</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- ========== CRITICAL: Credential & identity files ========== -->
    <!-- These are PRIMARY detection targets for kernel LPE exploits -->
    <directories check_all="yes" realtime="yes">/etc/passwd</directories>
    <directories check_all="yes" realtime="yes">/etc/shadow</directories>
    <directories check_all="yes" realtime="yes">/etc/group</directories>
    <directories check_all="yes" realtime="yes">/etc/gshadow</directories>
    <directories check_all="yes" realtime="yes">/etc/sudoers</directories>
    <directories check_all="yes">/etc/sudoers.d</directories>

    <!-- ========== CRITICAL: SSH & auth config ========== -->
    <directories check_all="yes" realtime="yes">/etc/ssh/sshd_config</directories>
    <directories check_all="yes">/etc/ssh/sshd_config.d</directories>
    <directories check_all="yes">/etc/pam.d</directories>
    <directories check_all="yes">/root/.ssh</directories>

    <!-- ========== CRITICAL: Kernel module config (exploit mitigation) ========== -->
    <directories check_all="yes" realtime="yes">/etc/modprobe.d</directories>
    <directories check_all="yes">/etc/sysctl.d</directories>
    <directories check_all="yes" realtime="yes">/etc/sysctl.conf</directories>

    <!-- ========== PERSISTENCE: Cron & systemd ========== -->
    <!-- These are lightweight (few files) — safe to keep -->
    <directories check_all="yes">/etc/cron.d</directories>
    <directories check_all="yes">/etc/cron.daily</directories>
    <directories check_all="yes">/etc/cron.hourly</directories>
    <directories check_all="yes">/etc/cron.weekly</directories>
    <directories check_all="yes">/etc/cron.monthly</directories>
    <directories check_all="yes">/var/spool/cron</directories>
    <directories check_all="yes">/etc/crontab</directories>
    <!-- ⚠️ PERFORMANCE: /etc/systemd/system can be large on heavy servers -->
    <directories check_all="yes">/etc/systemd/system</directories>
    <!-- ⚠️ PERFORMANCE: /usr/lib/systemd/system has 200+ unit files -->
    <!--    Comment out if causing CPU spikes during FIM scan       -->
    <!--
    <directories check_all="yes">/usr/lib/systemd/system</directories>
    -->

    <!-- ========== PERSISTENCE: Shell profiles & preload ========== -->
    <!-- These are lightweight (few files) — safe to keep -->
    <directories check_all="yes">/etc/profile</directories>
    <directories check_all="yes">/etc/profile.d</directories>
    <directories check_all="yes">/etc/bashrc</directories>
    <directories check_all="yes">/etc/bash.bashrc</directories>
    <directories check_all="yes">/etc/shells</directories>
    <directories check_all="yes" realtime="yes">/etc/ld.so.preload</directories>
    <directories check_all="yes">/etc/ld.so.conf</directories>
    <directories check_all="yes">/etc/ld.so.conf.d</directories>

    <!-- ========== CRITICAL: SUID binaries (DirtyFrag/LPE targets) ========== -->
    <!-- These specific binaries are targeted by page-cache corruption exploits -->
    <!-- Monitoring individual files avoids the CPU cost of scanning all of /usr/bin -->
    <directories check_all="yes" realtime="yes">/usr/bin/su</directories>
    <directories check_all="yes" realtime="yes">/usr/bin/sudo</directories>
    <directories check_all="yes" realtime="yes">/usr/bin/passwd</directories>
    <directories check_all="yes" realtime="yes">/usr/bin/mount</directories>
    <directories check_all="yes" realtime="yes">/usr/bin/pkexec</directories>
    <directories check_all="yes" realtime="yes">/usr/bin/newgrp</directories>
    <directories check_all="yes" realtime="yes">/usr/bin/chsh</directories>
    <directories check_all="yes" realtime="yes">/usr/bin/chfn</directories>
    <directories check_all="yes" realtime="yes">/usr/bin/gpasswd</directories>

    <!-- ========== STANDARD: Full system binaries & config ========== -->
    <!-- ⚠️ PERFORMANCE: These dirs contain thousands of files.    -->
    <!--    Full hash check every 600s is CPU-heavy on /usr/bin.   -->
    <!--    Only uncomment if you need broader coverage beyond     -->
    <!--    the specific SUID binaries monitored above.            -->
    <!--
    <directories check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories check_all="yes">/bin,/sbin,/boot</directories>
    -->

    <!-- ========== ANTI-FORENSICS: PHP sessions (web exploit indicator) ========== -->
    <directories check_all="yes">/var/lib/php/sessions</directories>

    <!-- ========== IGNORES: Known noisy/irrelevant files ========== -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/random.seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/etc/svc/volatile</ignore>
    <ignore>/sys/kernel/security</ignore>
    <ignore>/sys/kernel/debug</ignore>
    <ignore>/etc/resolv.conf</ignore>
    <ignore>/etc/machine-id</ignore>

    <!-- Never compute diff on sensitive files -->
    <nodiff>/etc/ssl/private.key</nodiff>
    <nodiff>/etc/shadow</nodiff>
    <nodiff>/etc/gshadow</nodiff>

    <skip_nfs>yes</skip_nfs>
    <remove_old_diff>yes</remove_old_diff>
    <restart_audit>yes</restart_audit>
  </syscheck>

  <!-- ============================================================ -->
  <!-- LOG COLLECTION — CRITICAL for detection                      -->
  <!-- ============================================================ -->

  <!-- ========== AUDITD (CRITICAL — enables 9 CVE rules) ========== -->
  <!-- Requires: auditd installed + audit.rules deployed            -->
  <!-- Keys decoded: modules, af_alg, splice_user, priv_esc,       -->
  <!--   etcpasswd, recon, susp_activity, susp_shell, etc.         -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- ========== SYSLOG (GUARANTEED — always available) ========== -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- ========== AUTH LOG (GUARANTEED — su, sudo, SSH, PAM) ========== -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- ========== KERNEL LOG (module loads, panics) ========== -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <!-- ========== DPKG/YUM (package management tracking) ========== -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <!-- ========== SECURE LOG (RHEL/CentOS equivalent of auth.log) ========== -->
  <!-- Uncomment on RHEL/CentOS/Rocky/Alma systems -->
  <!--
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/secure</location>
  </localfile>
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/messages</location>
  </localfile>
  -->

  <!-- ========== SYSMON FOR LINUX (OPTIONAL — bonus detection) ========== -->
  <!-- Sysmon writes to /var/log/syslog by default (already collected above). -->

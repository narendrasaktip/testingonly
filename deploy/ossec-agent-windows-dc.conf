<!--
  DFX SOC — Wazuh Agent ossec.conf (Windows Domain Controller)
  Template for: Active Directory Domain Controllers (2016/2019/2022)

  This config INCLUDES everything from workstation config PLUS:
    - Directory Service log (AD replication, schema, object changes)
    - DNS Server log (zone transfers, poisoning)
    - LDAP diagnostics (Bloodhound/enumeration detection)
    - FIM on NTDS.dit, SYSVOL, GPO paths
    - Registry monitoring for AD-specific keys
    - DC-specific Security EventID filter (KEEPS 4662, 4656, 4663)
    - Kerberos detailed events (4768, 4769, 4771, 4776)
    - Trust/delegation changes

  Prerequisites:
    - Sysmon installed + SwiftOnSecurity/Olaf config deployed
    - Agent registered to manager
    - PowerShell ScriptBlock logging enabled (GPO)
    - Advanced Audit Policy: Object Access → Directory Service Access = Success,Failure
    - Advanced Audit Policy: DS Access → Directory Service Changes = Success
    - Advanced Audit Policy: Logon/Logoff → Kerberos Service Ticket = Success,Failure
    - (Optional) LDAP Diagnostics: HKLM\SYSTEM\CurrentControlSet\Services\NTDS\Diagnostics
      → "15 Field Engineering" = 5 (enables Event 1644 for expensive LDAP queries)

  Deploy to: C:\Program Files (x86)\ossec-agent\ossec.conf
  Last updated: 2026-05-15

  IMPORTANT: Replace MANAGER_IP with actual manager IP/hostname
-->
<ossec_config>

  <!-- ============================================================ -->
  <!-- CLIENT — Manager connection                                  -->
  <!-- ============================================================ -->
  <client>
    <server>
      <address>MANAGER_IP</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>windows, windows-server, windows-dc</config-profile>
    <crypto_method>aes</crypto_method>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <enrollment>
      <enabled>yes</enabled>
      <manager_address>MANAGER_IP</manager_address>
      <port>1515</port>
    </enrollment>
  </client>

  <!-- Client buffer — DCs are HIGH volume, tune aggressively -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>10000</queue_size>
    <events_per_second>1000</events_per_second>
  </client_buffer>

  <!-- ============================================================ -->
  <!-- LOGGING                                                       -->
  <!-- ============================================================ -->
  <logging>
    <log_format>plain</log_format>
  </logging>

  <!-- ============================================================ -->
  <!-- WODLES — System inventory                                    -->
  <!-- ============================================================ -->
  <!-- ⚠️ PERFORMANCE: Scans all packages, hotfixes, ports, processes.
       DCs have many services — scan can take 60-120s of CPU.
       Set to 12h to reduce impact. -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>12h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
    <hotfixes>yes</hotfixes>
  </wodle>

  <!-- ============================================================ -->
  <!-- SYSCHECK — File integrity monitoring                         -->
  <!-- DC-specific: NTDS.dit, SYSVOL, GPO, plus standard paths     -->
  <!-- ============================================================ -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>600</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- ========== DC-CRITICAL: Active Directory database ========== -->
    <!-- NTDS.dit = THE AD database. Access/copy = credential theft  -->
    <directories check_all="yes" realtime="yes">%WINDIR%\NTDS</directories>

    <!-- ========== DC-CRITICAL: SYSVOL & GPO ========== -->
    <!-- GPO tampering = policy manipulation across domain           -->
    <directories check_all="yes" realtime="yes">%WINDIR%\SYSVOL\domain\Policies</directories>
    <directories check_all="yes">%WINDIR%\SYSVOL\domain\scripts</directories>

    <!-- ========== DC-CRITICAL: DNS zones (if AD-integrated DNS) ========== -->
    <directories check_all="yes">%WINDIR%\System32\dns</directories>

    <!-- ========== CRITICAL: Windows system directories ========== -->
    <directories check_all="yes" realtime="yes">%WINDIR%\System32\drivers\etc</directories>
    <directories check_all="yes" realtime="yes">%WINDIR%\System32\GroupPolicy</directories>
    <directories check_all="yes" realtime="yes">%WINDIR%\System32\config</directories>

    <!-- ========== CRITICAL: Credential stores ========== -->
    <directories check_all="yes" realtime="yes">%WINDIR%\System32\config\SAM</directories>
    <directories check_all="yes" realtime="yes">%WINDIR%\System32\config\SECURITY</directories>
    <directories check_all="yes" realtime="yes">%WINDIR%\System32\config\SYSTEM</directories>

    <!-- ========== PERSISTENCE: Startup locations ========== -->
    <directories check_all="yes">%WINDIR%\System32\Tasks</directories>
    <directories check_all="yes">%WINDIR%\System32\wbem</directories>
    <directories check_all="yes">%PROGRAMDATA%\Microsoft\Windows\Start Menu\Programs\Startup</directories>

    <!-- ========== PERSISTENCE: Services & drivers ========== -->
    <!-- ⚠️ PERFORMANCE: drivers/ has 500+ files. Can be heavy.
         Comment out if CPU spikes during FIM scan. -->
    <!--
    <directories check_all="yes">%WINDIR%\System32\drivers</directories>
    -->

    <!-- ========== STANDARD: System binaries ========== -->
    <!-- ⚠️ PERFORMANCE: System32 has 4000+ files, SysWOW64 has 3000+.
         Full hash scan = heavy CPU on DC. Uncomment only if needed. -->
    <!--
    <directories check_all="yes">%WINDIR%\System32</directories>
    <directories check_all="yes">%WINDIR%\SysWOW64</directories>
    -->
    <directories check_all="yes">%WINDIR%\regedit.exe</directories>
    <directories check_all="yes">%WINDIR%\System32\WindowsPowerShell</directories>

    <!-- ========== STANDARD: Program Files ========== -->
    <!-- ⚠️ PERFORMANCE: Can be 10GB+. Uncomment only if needed. -->
    <!--
    <directories check_all="yes">%PROGRAMFILES%</directories>
    <directories check_all="yes">%PROGRAMFILES(x86)%</directories>
    -->

    <!-- ========== IGNORES ========== -->
    <ignore>%WINDIR%\System32\LogFiles</ignore>
    <ignore>%WINDIR%\System32\wbem\Repository</ignore>
    <ignore>%WINDIR%\System32\sru</ignore>
    <ignore>%WINDIR%\System32\catroot2</ignore>
    <ignore>%WINDIR%\System32\config\systemprofile</ignore>
    <ignore>%WINDIR%\SoftwareDistribution</ignore>
    <ignore>%WINDIR%\Temp</ignore>
    <ignore>%WINDIR%\Prefetch</ignore>
    <ignore type="sregex">.log$|.tmp$|.blf$|.regtrans-ms$</ignore>
    <!-- DC-specific ignores: AD replication temp files -->
    <ignore>%WINDIR%\NTDS\edb.log</ignore>
    <ignore>%WINDIR%\NTDS\edbres00001.jrs</ignore>
    <ignore>%WINDIR%\NTDS\edbres00002.jrs</ignore>
    <ignore>%WINDIR%\NTDS\temp.edb</ignore>

    <!-- Never compute diff on sensitive files -->
    <nodiff>%WINDIR%\System32\config\SAM</nodiff>
    <nodiff>%WINDIR%\System32\config\SECURITY</nodiff>
    <nodiff>%WINDIR%\NTDS\ntds.dit</nodiff>

    <!-- ========== REGISTRY MONITORING ========== -->

    <!-- Persistence: Run keys -->
    <windows_registry arch="both">HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry arch="both">HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
    <windows_registry arch="both">HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry arch="both">HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>

    <!-- Persistence: Services -->
    <windows_registry>HKLM\SYSTEM\CurrentControlSet\Services</windows_registry>

    <!-- Persistence: Scheduled Tasks -->
    <windows_registry>HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Schedule\TaskCache\Tree</windows_registry>

    <!-- Persistence: WMI subscriptions -->
    <windows_registry>HKLM\SOFTWARE\Microsoft\Wbem</windows_registry>

    <!-- Persistence: Image File Execution Options (debugger hijack) -->
    <windows_registry arch="both">HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options</windows_registry>

    <!-- Persistence: AppInit DLLs -->
    <windows_registry arch="both">HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows</windows_registry>

    <!-- Credential access: LSA -->
    <windows_registry>HKLM\SYSTEM\CurrentControlSet\Control\Lsa</windows_registry>
    <windows_registry>HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders</windows_registry>

    <!-- DC-SPECIFIC: Kerberos config -->
    <windows_registry>HKLM\SYSTEM\CurrentControlSet\Control\Lsa\Kerberos\Parameters</windows_registry>

    <!-- DC-SPECIFIC: NTDS diagnostics (LDAP query logging level) -->
    <windows_registry>HKLM\SYSTEM\CurrentControlSet\Services\NTDS\Diagnostics</windows_registry>
    <windows_registry>HKLM\SYSTEM\CurrentControlSet\Services\NTDS\Parameters</windows_registry>

    <!-- DC-SPECIFIC: DNS Server config -->
    <windows_registry>HKLM\SYSTEM\CurrentControlSet\Services\DNS\Parameters</windows_registry>

    <!-- DC-SPECIFIC: Netlogon (secure channel, trust) -->
    <windows_registry>HKLM\SYSTEM\CurrentControlSet\Services\Netlogon\Parameters</windows_registry>

    <!-- DC-SPECIFIC: Group Policy client -->
    <windows_registry>HKLM\SOFTWARE\Policies\Microsoft\Windows\Group Policy</windows_registry>

    <!-- Security policy -->
    <windows_registry>HKLM\SOFTWARE\Policies\Microsoft\Windows\System</windows_registry>
    <windows_registry>HKLM\SOFTWARE\Policies\Microsoft\Windows Defender</windows_registry>

    <!-- Defense evasion: AMSI bypass -->
    <windows_registry>HKLM\SOFTWARE\Microsoft\AMSI</windows_registry>

    <!-- Network: Firewall rules -->
    <windows_registry>HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy</windows_registry>

    <skip_nfs>yes</skip_nfs>
    <remove_old_diff>yes</remove_old_diff>
  </syscheck>

  <!-- ============================================================ -->
  <!-- EVENT LOG COLLECTION                                         -->
  <!-- DC-specific: includes Directory Service, DNS, LDAP           -->
  <!-- ============================================================ -->

  <!-- ========== SYSMON (CRITICAL) ========== -->
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== SECURITY EVENT LOG (DC-TUNED FILTER) ========== -->
  <!-- NOTE: DC filter is LESS restrictive than workstation filter  -->
  <!-- We KEEP 4662 (Directory Service Access) for DCSync detection -->
  <!-- We KEEP 4656/4663 (Object Access) for NTDS.dit access       -->
  <!-- We still EXCLUDE 5145 (share access) and 5156/5157 (WFP)    -->
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
    <query>Event/System[EventID != 5145 and EventID != 5156 and EventID != 5157]</query>
  </localfile>

  <!--
    KEY SECURITY EVENTS ON DC:
    4624/4625  - Logon success/failure
    4648       - Explicit credential logon (PtH indicator)
    4656       - Object handle requested (NTDS.dit access)
    4662       - Directory Service Access (DCSync: Replication rights)
    4663       - Object accessed (NTDS.dit read)
    4670       - Permissions changed on object
    4672       - Special privileges assigned (admin logon)
    4706/4707  - Trust created/removed
    4713       - Kerberos policy changed
    4720       - User account created
    4724/4725  - Password reset/account disabled
    4728/4732  - Member added to security group (global/local admin)
    4738       - User account changed
    4740       - Account locked out
    4741/4742  - Computer account created/changed (rogue DC)
    4756       - Member added to universal group
    4768       - Kerberos TGT requested (AS-REQ)
    4769       - Kerberos service ticket (TGS-REQ)
    4771       - Kerberos pre-auth failed
    4776       - NTLM authentication (DC validates credential)
    5136/5137  - Directory Service object modified/created (GPO change)
    5141       - Directory Service object deleted
  -->

  <!-- ========== DIRECTORY SERVICE LOG (DC-ONLY) ========== -->
  <!-- AD replication, schema changes, object modifications         -->
  <!-- CRITICAL for: DCSync detection, rogue DC, schema tampering   -->
  <localfile>
    <location>Directory Service</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== DNS SERVER LOG (DC-ONLY, if DNS role installed) ========== -->
  <!-- DNS poisoning, zone transfer, record manipulation            -->
  <localfile>
    <location>DNS Server</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== SYSTEM EVENT LOG ========== -->
  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== APPLICATION EVENT LOG ========== -->
  <localfile>
    <location>Application</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== POWERSHELL SCRIPTBLOCK LOGGING ========== -->
  <localfile>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <localfile>
    <location>Windows PowerShell</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== WINDOWS DEFENDER ========== -->
  <localfile>
    <location>Microsoft-Windows-Windows Defender/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== WINDOWS FIREWALL ========== -->
  <localfile>
    <location>Microsoft-Windows-Windows Firewall With Advanced Security/Firewall</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== BITS (download + persistence) ========== -->
  <localfile>
    <location>Microsoft-Windows-Bits-Client/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== TASK SCHEDULER ========== -->
  <localfile>
    <location>Microsoft-Windows-TaskScheduler/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== TERMINAL SERVICES (RDP) ========== -->
  <localfile>
    <location>Microsoft-Windows-TerminalServices-LocalSessionManager/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <localfile>
    <location>Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== WMI ========== -->
  <localfile>
    <location>Microsoft-Windows-WMI-Activity/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== DC-SPECIFIC: LDAP CLIENT (Expensive query logging) ========== -->
  <!-- Requires: NTDS\Diagnostics "15 Field Engineering" = 5        -->
  <!-- Detects: Bloodhound, AD enumeration, large LDAP queries      -->
  <!-- Event 1644 = Expensive/inefficient LDAP search               -->
  <localfile>
    <location>Directory Service</location>
    <log_format>eventchannel</log_format>
    <query>Event/System[EventID=1644]</query>
  </localfile>

  <!-- ========== DC-SPECIFIC: AD Web Services ========== -->
  <!-- PowerShell AD module uses ADWS — tracks remote AD queries    -->
  <localfile>
    <location>Microsoft-Windows-ADWS/Debug</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== DC-SPECIFIC: Kerberos Key Distribution Center ========== -->
  <!-- Uncomment if KDC operational logging is enabled               -->
  <!--
  <localfile>
    <location>Microsoft-Windows-Kerberos-Key-Distribution-Center/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
  -->

  <!-- ========== DC-SPECIFIC: Group Policy ========== -->
  <localfile>
    <location>Microsoft-Windows-GroupPolicy/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== DC-SPECIFIC: NTLM Operational ========== -->
  <!-- Tracks NTLM authentication — useful for PtH/relay detection  -->
  <localfile>
    <location>Microsoft-Windows-NTLM/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== WINRM (Remote Management / PSRemoting) ========== -->
  <!-- Detects: lateral movement via PSRemoting, WinRM exploitation  -->
  <localfile>
    <location>Microsoft-Windows-WinRM/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== CODE INTEGRITY ========== -->
  <!-- Detects: unsigned drivers, WHQL bypass, kernel code integrity  -->
  <localfile>
    <location>Microsoft-Windows-CodeIntegrity/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== PRINT SERVICE ========== -->
  <!-- Detects: PrintNightmare (CVE-2021-34527), spooler exploitation -->
  <localfile>
    <location>Microsoft-Windows-PrintService/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========== DC-SPECIFIC: DHCP SERVER (if DHCP role installed) ========== -->
  <!-- DHCP leases = IP-to-MAC mapping, rogue device detection       -->
  <!--
  <localfile>
    <location>DhcpAdminEvents</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <localfile>
    <location>Microsoft-Windows-Dhcp-Server/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
  -->

  <!-- ========== DC-SPECIFIC: AD CERTIFICATE SERVICES (if CA role) ========== -->
  <!-- AD CS attacks: ESC1-ESC8, certifried, template abuse          -->
  <!--
  <localfile>
    <location>Microsoft-Windows-CertificateServicesClient-Lifecycle-System/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
  -->

  <!-- ========== DC-SPECIFIC: SMB SERVER ========== -->
  <!-- File share access on DC — SYSVOL, NETLOGON access tracking    -->
  <!--
  <localfile>
    <location>Microsoft-Windows-SMBServer/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
  -->

  <!-- ========== DC-SPECIFIC: AD FS (if ADFS role installed) ========== -->
  <!-- Golden SAML, token forgery, ADFS sign-in abuse                -->
  <!--
  <localfile>
    <location>AD FS/Admin</location>
    <log_format>eventchannel</log_format>
  </localfile>
  -->

  <!-- ========== DC-SPECIFIC: DFS REPLICATION ========== -->
  <!-- Multi-DC SYSVOL replication monitoring                         -->
  <!--
  <localfile>
    <location>DFS Replication</location>
    <log_format>eventchannel</log_format>
  </localfile>
  -->

  <!-- ========== APPLOCKER (if enabled) ========== -->
  <!--
  <localfile>
    <location>Microsoft-Windows-AppLocker/EXE and DLL</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <localfile>
    <location>Microsoft-Windows-AppLocker/MSI and Script</location>
    <log_format>eventchannel</log_format>
  </localfile>
  -->

  <!-- ============================================================ -->
  <!-- ACTIVE RESPONSE                                               -->
  <!-- ============================================================ -->
  <active-response>
    <disabled>yes</disabled>
  </active-response>

  <localfile>
    <log_format>syslog</log_format>
    <location>active-responses.log</location>
  </localfile>

</ossec_config>

<!--
  DFX SOC — Wazuh Manager ossec.conf (SLIM)
  Single-node local lab edition

  Essentials only:
    - TCP on port 1514
    - logall_json=yes for forensics
    - queue_size=131072
    - Vulnerability detection enabled
    - Custom decoders + rules in etc/decoders & etc/rules
    - CDB lists in etc/lists/defenxor/
    - wazuh-logtest enabled

  Deploy to: /var/ossec/etc/ossec.conf (on Wazuh manager)
  Last updated: 2026-05-16
-->
<ossec_config>

  <!-- ============================================================ -->
  <!-- GLOBAL                                                        -->
  <!-- ============================================================ -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>yes</logall>
    <logall_json>yes</logall_json>
    <email_notification>no</email_notification>
    <queue_size>131072</queue_size>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>100s</agents_disconnection_alert_time>
    <white_list>127.0.0.1</white_list>
    <white_list>10.66.0.2</white_list>
  </global>

  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <logging>
    <log_format>plain</log_format>
  </logging>

  <!-- ============================================================ -->
  <!-- REMOTE — Agent connection                                    -->
  <!-- ============================================================ -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- ============================================================ -->
  <!-- VULNERABILITY DETECTION                                       -->
  <!-- ============================================================ -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

  <!-- ============================================================ -->
  <!-- INDEXER — OpenSearch connection                               -->
  <!-- ============================================================ -->
  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://127.0.0.1:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/filebeat/certs/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/filebeat/certs/filebeat.pem</certificate>
      <key>/etc/filebeat/certs/filebeat-key.pem</key>
    </ssl>
  </indexer>

  <!-- ============================================================ -->
  <!-- ACTIVE RESPONSE — Commands                                   -->
  <!-- ============================================================ -->
  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <command>
    <name>disable-account</name>
    <executable>disable-account.sh</executable>
    <expect>user</expect>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- ============================================================ -->
  <!-- RULESET — Decoders, rules, CDB lists                        -->
  <!-- ============================================================ -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-sources</list>
    <list>etc/lists/amazon/aws-eventnames</list>

    <!-- DFX custom CDB lists -->
    <list>etc/lists/defenxor/administrative-ports</list>
    <list>etc/lists/defenxor/common-ports</list>
    <list>etc/lists/defenxor/domain-controller-hostnames</list>
    <list>etc/lists/defenxor/domain-controller-ips</list>
    <list>etc/lists/defenxor/high-privilege-users</list>
    <list>etc/lists/defenxor/malicious-domains</list>
    <list>etc/lists/defenxor/malicious-hashes</list>
    <list>etc/lists/defenxor/pam-ips</list>
    <list>etc/lists/defenxor/others</list>
    <list>etc/lists/defenxor/bash_profile</list>

    <!-- DFX custom decoders + rules -->
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

  <!-- ============================================================ -->
  <!-- RULE TEST (wazuh-logtest)                                    -->
  <!-- ============================================================ -->
  <rule_test>
    <enabled>yes</enabled>
    <threads>1</threads>
    <max_sessions>64</max_sessions>
    <session_timeout>15m</session_timeout>
  </rule_test>

  <!-- ============================================================ -->
  <!-- AUTH — Agent registration                                    -->
  <!-- ============================================================ -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <force>
      <enabled>yes</enabled>
      <key_mismatch>yes</key_mismatch>
      <disconnected_time enabled="yes">1h</disconnected_time>
      <after_registration_time>1h</after_registration_time>
    </force>
    <purge>no</purge>
    <use_password>no</use_password>
  </auth>

  <!-- ============================================================ -->
  <!-- LOG COLLECTION — Manager-side                                -->
  <!-- ============================================================ -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

</ossec_config>
